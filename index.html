<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinvest</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a0a0a,#1a0000,#0a0a0a);
color:#f1f5f9;
text-align:center;
}

/* NAV */
nav{
position:absolute;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

.logo{
display:flex;
flex-direction:column;
align-items:flex-start;
}

.logo h3{
margin:0;
}

.home-link{
font-size:0.7rem;
color:#aaa;
text-decoration:none;
}

nav a{
color:#aaa;
text-decoration:none;
}

/* MAIN MESSAGE */
.message{
max-width:600px;
}

.message h1{
font-size:2.5rem;
margin-bottom:15px;
}

.message p{
color:#aaa;
font-size:1rem;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
  <h3>Zinvest</h3>
  <a href="https://zinvest.netlify.app" class="home-link">Home</a>
</div>

<a href="#">About</a>
</nav>

<!-- MESSAGE -->
<div class="message">
<h1>🚧 Site is Being Built</h1>
<p>Thanks for your interest. We’re working on something powerful. Stay tuned.</p>
</div>

</body>
</html>
