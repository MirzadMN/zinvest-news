<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Zinvest — Market Brief</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#08080c;
  --bg2:#0e0e14;
  --surface:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.07);
  --text:#f0ece8;
  --muted:#7a7670;
  --red:#e03535;
  --green:#1fbf75;
}

html,
body{
  width:100%;
  min-height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  position:relative;
}

/* NOISE */

body::before{
  content:'';
  position:fixed;
  inset:0;

  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");

  opacity:0.03;

  pointer-events:none;
}

/* NAVBAR */

nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:22px 60px;

  z-index:100;

  border-bottom:1px solid var(--border);

  background:rgba(8,8,12,0.78);

  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

.nav-logo{
  text-decoration:none;
  color:var(--text);

  font-family:'Cormorant Garamond',serif;

  font-size:1.8rem;
  font-weight:600;
  letter-spacing:.08em;
}

.nav-logo span{
  color:var(--red);
}

.nav-links{
  display:flex;
  align-items:center;
  gap:34px;
}

.nav-links a{
  text-decoration:none;
  color:var(--muted);

  text-transform:uppercase;

  font-size:.76rem;
  letter-spacing:.18em;

  transition:.3s ease;
}

.nav-links a:hover{
  color:var(--text);
}

/* TICKER */

.market-ticker{

  position:fixed;

  top:82px;
  left:0;

  width:100%;
  height:46px;

  overflow:hidden;

  z-index:90;

  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);

  background:rgba(255,255,255,0.03);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}

.ticker-wrapper{
  width:100%;
  height:100%;
  overflow:hidden;

  display:flex;
  align-items:center;
}

.ticker-track{

  display:flex;
  align-items:center;

  width:max-content;

  animation:tickerScroll 40s linear infinite;
}

.ticker-track:hover{
  animation-play-state:paused;
}

.ticker-item{

  display:flex;
  align-items:center;

  gap:12px;

  padding:0 55px;

  white-space:nowrap;

  text-transform:uppercase;

  font-size:.82rem;

  letter-spacing:.08em;
}

.ticker-name{
  color:var(--text);
}

.ticker-value{
  color:var(--green);
}

.ticker-negative{
  color:var(--red);
}

@keyframes tickerScroll{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-50%);
  }

}

/* MAIN */

.main{
  width:100%;
  min-height:100vh;

  padding-top:180px;
  padding-bottom:100px;

  display:flex;
  justify-content:center;
}

.content{
  width:100%;
  max-width:960px;

  padding:0 24px;

  position:relative;
  z-index:2;
}

/* GLOW */

.glow{
  position:fixed;

  width:600px;
  height:600px;

  background:radial-gradient(circle, rgba(224,53,53,0.13) 0%, transparent 70%);

  filter:blur(90px);

  top:10%;
  left:50%;

  transform:translateX(-50%);

  z-index:0;
}

/* TITLES */

.title{

  font-family:'Cormorant Garamond',serif;

  font-size:clamp(3rem,7vw,5.8rem);

  text-align:center;

  margin-bottom:12px;

  letter-spacing:.05em;
}

.title span{
  color:var(--red);
}

.subtitle{

  text-align:center;

  color:var(--muted);

  text-transform:uppercase;

  font-size:.76rem;

  letter-spacing:.3em;

  margin-bottom:70px;
}

/* MARKET CARD */

.market-card{

  width:100%;

  border-radius:30px;

  background:rgba(255,255,255,0.03);

  border:1px solid var(--border);

  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);

  padding:40px;

  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.market-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:20px;

  flex-wrap:wrap;

  margin-bottom:30px;
}

.market-heading{

  text-transform:uppercase;

  letter-spacing:.14em;

  font-size:1.1rem;
}

.last-updated{

  color:var(--muted);

  font-size:.76rem;

  letter-spacing:.15em;

  text-transform:uppercase;
}

.market-brief{

  color:#d6d1ca;

  line-height:2;

  font-size:1rem;
}

/* MOBILE */

@media(max-width:768px){

  nav{
    padding:18px 20px;
  }

  .nav-links{
    gap:16px;
  }

  .nav-links a{
    font-size:.62rem;
  }

  .ticker-item{
    padding:0 30px;
    font-size:.72rem;
  }

  .market-card{
    padding:28px;
  }

  .market-brief{
    font-size:.92rem;
  }

}

</style>
</head>

<body>

<div class="glow"></div>

<!-- NAVBAR -->

<nav>

  <a href="index.html" class="nav-logo">

    Zin<span>vest</span>

  </a>

  <div class="nav-links">

    <a href="#">Products</a>
    <a href="#">News</a>
    <a href="#">Contact</a>

  </div>

</nav>

<!-- MARKET TICKER -->

<div class="market-ticker">

  <div class="ticker-wrapper">

    <div class="ticker-track" id="tickerTrack"></div>

  </div>

</div>

<!-- MAIN -->

<div class="main">

  <div class="content">

    <h1 class="title">

      Market <span>Brief</span>

    </h1>

    <p class="subtitle">

      Indian Markets Overview

    </p>

    <div class="market-card">

      <div class="market-top">

        <div class="market-heading">

          Daily Market Brief

        </div>

        <div class="last-updated" id="lastUpdated">

          LAST UPDATED — LOADING...

        </div>

      </div>

      <div class="market-brief" id="marketBrief">

        Loading market brief...

      </div>

    </div>

  </div>

</div>

<!-- SUPABASE -->

<script type="module">

import { createClient }

from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

/* =========================
   SUPABASE CONFIG
========================= */

const supabaseUrl = 'https://blsgydcxoivtckihtmag.supabase.co'

const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsc2d5ZGN4b2l2dGNraWh0bWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjkwNTYsImV4cCI6MjA5MzYwNTA1Nn0.DWPvB66OO5_KAHt_NGDHjSeU213p9iSCPTth7ecAeeo'

const supabase = createClient(
  supabaseUrl,
  supabaseKey
)

/* =========================
   LOAD TICKER
========================= */

async function loadTicker(){

  const { data, error } = await supabase

    .from('market_ticker')

    .select('*')

    .order('id', { ascending:true })

  if(error){

    console.log(error)

    return
  }

  const track = document.getElementById('tickerTrack')

  let items = ''

  data.forEach(item => {

    items += `

      <div class="ticker-item">

        <span class="ticker-name">

          ${item.index_name}

        </span>

        <span class="${
          item.positive
          ? 'ticker-value'
          : 'ticker-negative'
        }">

          ${item.value}

          ${item.change}

        </span>

      </div>

    `
  })

  /* duplicate for seamless scroll */

  track.innerHTML = items + items
}

/* =========================
   LOAD MARKET BRIEF
========================= */

async function loadMarketBrief(){

  const { data, error } = await supabase

    .from('market_brief')

    .select('*')

    .order('updated_at', { ascending:false })

    .limit(1)

    .single()

  if(error){

    console.log(error)

    return
  }

  document.getElementById('marketBrief').innerHTML =
    data.brief

  const date = new Date(data.updated_at)

  document.getElementById('lastUpdated').innerHTML =

    `LAST UPDATED — ${date.toLocaleString('en-IN')}`
}

/* =========================
   INITIAL LOAD
========================= */

loadTicker()

loadMarketBrief()

/* =========================
   AUTO REFRESH
========================= */

setInterval(() => {

  loadTicker()

  loadMarketBrief()

}, 10000)

</script>

</body>
</html>
